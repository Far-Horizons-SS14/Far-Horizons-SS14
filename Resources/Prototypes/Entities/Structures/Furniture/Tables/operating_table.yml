- type: entity
  id: OperatingTable
  parent: Bed
  name: Operating Table #FH-Edit
  description: Special medical table for surgery. Modified to prevent bodies from rotting as well as being able to connect to an operating computer to get the latest on scientific advancements. #FH-Edit
  components:
  - type: Sprite
    sprite: Structures/Furniture/Tables/optable.rsi
    state: operating_table
    noRot: true
  - type: Icon
    sprite: Structures/Furniture/Tables/optable.rsi
    state: operating_table
  - type: OperatingTable
  # Starlight-start: Surgery body scanner
  - type: HealOnBuckle
    damage: {}
  - type: InteractionOutline
  - type: DeviceList
  - type: DeviceNetwork
    deviceNetId: Wired
  - type: DeviceLinkSink
    ports:
      - BodyScannerReceiver
  - type: PlaceableSurface
    isPlaceable: false
  # Starlight-end
  # FarHorizons Start
  - type: SurgeryBedSpeed
    bedSpeedModifier: 1.0
  - type: AntiRotOnBuckle
  - type: ApcPowerReceiver
    powerLoad: 500
  - type: ExtensionCableReceiver
  # FarHorizons End