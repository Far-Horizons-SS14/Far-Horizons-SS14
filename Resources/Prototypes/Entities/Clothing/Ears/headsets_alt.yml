- type: entity
  abstract: true
  parent: ClothingHeadset
  id: ClothingHeadsetAlt
  name: Headset #Far Horizons - The Great Capitalization Crusade
  description: An updated, modular intercom that fits over the head. Takes encryption keys.
  components:
  - type: Sprite
    state: icon_alt
  - type: Clothing
    equippedPrefix: alt

- type: entity
  parent: ClothingHeadsetAlt
  id: ClothingHeadsetAltCargo
  name: Quartermaster's Over-Ear Headset #Far Horizons - The Great Capitalization Crusade
  components:
  - type: ContainerFill
    containers:
      key_slots:
      # - EncryptionKeyExpedition # Far Horizons - removed
      - EncryptionKeyCargo
      - EncryptionKeyCommand
      - EncryptionKeyCommon
  - type: Sprite
    sprite: _FarHorizons/Clothing/Ears/Headsets/cargo.rsi #Far Horizons
  - type: Clothing
    sprite: _FarHorizons/Clothing/Ears/Headsets/cargo.rsi #Far Horizons
  - type: RadioChime
    sound:
      path: /Audio/_Starlight/Effects/Radio/qm.ogg

