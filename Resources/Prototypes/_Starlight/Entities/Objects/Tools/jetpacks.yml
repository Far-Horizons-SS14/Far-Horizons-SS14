#USSP
- type: entity
  id: JetpackSSFMarine
  parent: [BaseJetpack, BaseSovietContraband]
  name: SSF marine jetpack
  suffix: Empty
  description: Standard issued soviet-made jetpack for the kosmos.
  components:
    - type: Item
      sprite: _Starlight/Objects/Tanks/Jetpacks/marine_jetpack.rsi
    - type: Sprite
      sprite: _Starlight/Objects/Tanks/Jetpacks/marine_jetpack.rsi
    - type: Clothing
      sprite: _Starlight/Objects/Tanks/Jetpacks/marine_jetpack.rsi
      slots:
        - Back
        - suitStorage
        - Belt

- type: entity
  id: JetpackSSFMarineFilled
  parent: [JetpackSSFMarine, BaseSovietContraband]
  name: SSF marine jetpack
  description: Standard issued soviet-made jetpack for the kosmos.
  components:
    - type: Item
      sprite: _Starlight/Objects/Tanks/Jetpacks/marine_jetpack.rsi
    - type: Sprite
      sprite: _Starlight/Objects/Tanks/Jetpacks/marine_jetpack.rsi
    - type: Clothing
      sprite: _Starlight/Objects/Tanks/Jetpacks/marine_jetpack.rsi
      slots:
        - Back
        - suitStorage
        - Belt
    - type: GasTank
      outputPressure: 42.6
      air:
        volume: 5
        temperature: 293.15
        moles:
          - 1.025689525 # oxygen
          - 1.025689525 # nitrogen

# NTNC borg
- type: entity
  parent: [ JetpackBlack, BaseCentcommContraband ]
  id: JetpackCyborgCentcomm
  name: CentComm jetpack
  suffix: Cyborg, Infinite
  description: Specialised jetpack for cyborgs which harvests moles on the go.
  components:
  - type: Jump
    action: JumpJetNoMoles
  - type: GasTank
    outputPressure: 21.3
    air:
      volume: 5
      temperature: 293.15
  - type: Jetpack
    moleUsage: 0
  - type: MovementSpeedModifier
    weightlessAcceleration: 1.3
    weightlessFriction: 0.3
    weightlessModifier: 1
