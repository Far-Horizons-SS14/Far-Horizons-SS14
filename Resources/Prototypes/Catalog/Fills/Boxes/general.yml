- type: entity
  parent: BoxBase
  id: BoxCardboard
  name: Cardboard Box #Far Horizons - The Great Capitalization Crusade
  description: A cardboard box for storing things.
  components:
  - type: Construction
    graph: BoxCardboard
    node: boxcardboard
    containers:
      - storagebase
  - type: PhysicalComposition
    materialComposition:
      Cardboard: 100
  - type: Sprite
    state: box
  - type: Tag
    tags:
    - BoxCardboard

- type: entity
  parent: BoxBaseSmall
  id: BoxCardboardSmall
  name: Small Cardboard Box #Far Horizons - The Great Capitalization Crusade
  description: A small cardboard box for storing things.
  components:
  - type: Construction
    graph: BoxCardboardSmall # Half the material cost of the "regular" cardboardbox
    node: boxcardboardsmall
    containers:
      - storagebase
  - type: PhysicalComposition # Half of the "regular" cardboard box
    materialComposition:
      Cardboard: 50
  - type: Sprite
    state: box
  - type: Tag
    tags:
    - BoxCardboard

- type: entity
  name: Mousetrap Box #Far Horizons - The Great Capitalization Crusade
  parent: BoxCardboard
  id: BoxMousetrap
  description: This box is filled with mousetraps. Try not to get your hand stuck in one.
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase:
        id: Mousetrap
        amount: 4
  - type: Sprite
    layers:
      - state: box
      - state: mousetraps

- type: entity
