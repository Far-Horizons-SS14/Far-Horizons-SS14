# region crew plushies
- type: entity 
  parent: BaseShadekinPlushie
  id: PlushieGlowtail
  name: Glowtail Plushie 
  description: A marketable plushie of a Shadekin musician. His markings Glow brightly with a light blue light and he looks relaxed in his tuxedo, somehow.
  components:
  - type: Item
    size: Small
    sprite: _FarHorizons\Objects\Fun\Plushies\glowtail_plushie.rsi
  - type: Sprite
    sprite: _FarHorizons\Objects\Fun\Plushies\glowtail_plushie.rsi
    layers:
      - state: icon
        shader: unshaded
  - type: ItemToggle
    onUse: false
    verbToggleOn: plushie-voicebox-activate
    verbToggleOff: plushie-voicebox-deactivate
  - type: ComponentToggler
    components:
      - type: DatasetVocalizer
        dataset: PlushiesGlowtail
      - type: TextToSpeech
        voice: duelist
