#region Pills
- type: entity
  name: pill canister
  parent: PillCanister
  id: PillCanisterTricordrazineCharcoal
  suffix: Charcoal 10u, 5 / Tricordrazine 10u, 5
  components:
  - type: Label
    currentLabel: Charcoal 10u / Tricordrazine 10u
  - type: StorageFill
    contents:
    - id: PillCharcoal
      amount: 5
    - id: PillTricordrazine
      amount: 5

- type: entity
  name: pill canister
  parent: PillCanister
  id: PillCanisterDexalinDylovene
  suffix: Dexalin 10u, 5 / Dylovene 10u, 5
  components:
  - type: Label
    currentLabel: Dexalin 10u / Dylovene 10u
  - type: StorageFill
    contents:
    - id: PillDexalin
      amount: 5
    - id: PillDylovene
      amount: 5

- type: entity
  suffix: Amoxla
  parent: PrefilledSyringe
  id: SyringeAmoxla
  components:
  - type: Label
    currentLabel: reagent-name-amoxla
  - type: SolutionContainerManager
    solutions:
      injector:
        maxVol: 15
        reagents:
          - ReagentId: Amoxla
            Quantity: 15

#region Blue Ointment
- type: entity
  parent: [BaseAutoMender, DrinkVisualsOpenable, DrinkVisualsFill] # You have no idea how long this took me to get to layer properly
  name: Blue Ointment Canister
  description: Used to treat those nasty burns. Seems to be able to hold more than a normal Canister.
  id: BlueOintmentEmpty
  suffix: Empty
  components:
  - type: Sprite
    sprite: _FarHorizons/Objects/Specific/Medical/blue_ointment.rsi
    layers:
    - state: empty
    - state: ointment1
      map: ["enum.SolutionContainerLayers.Fill"]
      visible: false
    - state: icon_open
      map: ["enum.OpenableVisuals.Layer"]
  - type: Item
    size: Small
    sprite: _FarHorizons/Objects/Specific/Medical/blue_ointment.rsi
    heldPrefix: ointment
  - type: SolutionContainerManager
    solutions:
      injector:
        maxVol: 20
  - type: Healing
    solutionDrain: true
    reagentsToDrain:
    - ReagentId: BurnCreamBlue
      Quantity: 1
    delay: 1.6
    damageContainers:
      - Biological
    damage:
      types:
        Heat: -5.5
        Cold: -5.5
        Shock: -5.5
        Caustic: -2
    healingBeginSound:
      path: "/Audio/Items/Medical/ointment_begin.ogg"
      params:
        volume: 1.0
        variation: 0.125
    healingEndSound:
      path: "/Audio/Items/Medical/ointment_end.ogg"
      params:
        volume: 1.0
        variation: 0.125
  - type: SolutionContainerVisuals
    maxFillLevels: 6
    fillBaseName: ointment
    inHandsMaxFillLevels: 0
    inHandsFillBaseName: -fill-
  - type: ExaminableSolution
    examinableWhileClosed: false
    heldOnly: false
  - type: InteractRestriction
    restrictInteractionTarget:
      blacklist:  # Use blacklist instead of whitelist so can be clicked on bags/medkits
        - IPC
  - type: Openable
    sound:
      collection: bottleOpenSounds
    closeable: true
    closeSound:
      collection: bottleCloseSounds
  - type: Tag
    tags:
    - Ointment

- type: entity
  suffix: Filled
  parent: BlueOintmentEmpty
  id: BlueOintment
  components:
  - type: SolutionContainerManager
    solutions:
      injector:
        maxVol: 20
        reagents:
        - ReagentId: BurnCreamBlue
          Quantity: 20

