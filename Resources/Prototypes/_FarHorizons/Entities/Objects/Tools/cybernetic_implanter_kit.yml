- type: entity
  parent: BaseItem
  id: BaseCyberneticImplanterKit
  abstract: true
  components:
    - type: Sprite
      sprite: _FarHorizons/Objects/Tools/singular_eye_CIK.rsi #TODO
      layers:
      - state: icon
        map: ["cyberneticImplanter"]
    - type: Appearance
    - type: GenericVisualizer
      visuals:
        enum.CyberneticImplanterVisuals.State:
          cyberneticImplanter:
            Icon: {state: icon}
            Implant: {state: icon_implant}
            Used: {state: icon_used}
            Gored: {state: icon_gored}
    - type: CyberneticImplanter
      implantedOrgan: null
      implantBeginSound:
        path: "/Audio/_Starlight/Medical/Surgery/scalpel1.ogg" #TODO
        params:
          volume: 1.0
          variation: 0.125
      implantEndSound:
        path: "/Audio/_Starlight/Medical/Surgery/scalpel2.ogg" #TODO
        params:
          volume: 1.0
          variation: 0.125

#region Syndicate

