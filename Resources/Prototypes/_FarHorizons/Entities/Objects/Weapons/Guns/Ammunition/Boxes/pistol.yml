# Boxes
- type: entity
  parent: BaseMagazineBoxPistol40
  id: MagazineBoxPistol40Practice
  name: ammunition box (.40 special practice)
  description: A cardboard box of .40 special rounds. Intended to hold non-harmful chalk ammunition.
  components:
  - type: BallisticAmmoProvider
    proto: CartridgePistolPractice
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
    - state: practice

