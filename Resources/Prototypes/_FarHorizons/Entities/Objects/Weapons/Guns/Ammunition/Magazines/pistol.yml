- type: entity
  id: MagazinePistol40Incendiary
  name: pistol magazine (.40 special incendiary)
  parent: MagazinePistol40Base
  components:
  - type: BallisticAmmoProvider
    proto: CartridgePistol40Incendiary
  - type: Sprite
    layers:
    - state: incendiary
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left-mag
      - state: inhand-left-stripe
        color: "#E7EEEE"
      right:
      - state: inhand-right-mag
      - state: inhand-right-stripe
        color: "#E7EEEE"

