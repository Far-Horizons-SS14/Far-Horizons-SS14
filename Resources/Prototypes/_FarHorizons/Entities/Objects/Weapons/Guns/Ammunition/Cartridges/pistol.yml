- type: entity
  id: CartridgePistol40Practice
  name: cartridge (.40 special practice)
  parent: BaseCartridgePistol
  components:
  - type: HitScanCartridgeAmmo
    hitscan: BulletPistolTrace40Practice
  - type: Sprite
    layers:
      - state: base
        map: [ "enum.AmmoVisualLayers.Base" ]
      - state: tip
        map: [ "enum.AmmoVisualLayers.Tip" ]
        color: "#D86E2C"

