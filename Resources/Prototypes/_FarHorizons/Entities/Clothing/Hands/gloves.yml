#region ## GSL ##
- type: entity
  parent: ClothingHandsButcherable
  id: ClothingHandsGlovesFingerlessCargo
  name: Cargo Fingerless Gloves
  description: Plain brown gloves without fingertips for the hard working. 
  components:
  - type: Sprite
    sprite: _FarHorizons/Clothing/Hands/Gloves/fingerless.rsi 
  - type: Clothing
    sprite: _FarHorizons/Clothing/Hands/Gloves/fingerless.rsi 
  - type: Fiber
    fiberMaterial: fibers-synthetic
    fiberColor: fibers-brown 
  - type: DamageOnInteractProtection
    damageProtection:
      flatReductions:
        Heat: 0 
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
        color: "#7c552f"
      right:
      - state: inhand-right
        color: "#7c552f"

- type: entity
  parent: ClothingHandsGlovesSyntheticBase
  id: ClothingHandsGlovesCargo
  name: Cargo Gloves
  description: Some nice padded gloves for moving items between crates over extended periods of time.
  components:
  - type: Sprite
    sprite: _FarHorizons/Clothing/Hands/Gloves/cargo.rsi
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
        color: "#535353"
      right:
      - state: inhand-right
        color: "#535353"
  - type: Clothing
    sprite: _FarHorizons/Clothing/Hands/Gloves/cargo.rsi
  - type: Butcherable
    butcheringType: Knife
    spawned:
    - id: MaterialCloth1
      amount: 1
  - type: Fiber
    fiberColor: fibers-black

- type: entity
  parent: ClothingHandsBase
  id: ClothingHandsGlovesScrapperTierOne
  name: Basic Scrapper Gloves
  description: These gloves will protect the wearer from electric shocks. Does not come with any armor protection.
  components:
  - type: FingerprintMask
  - type: Sprite
    sprite: _FarHorizons/Clothing/Hands/Gloves/salvaget1.rsi
  - type: Clothing
    sprite: _FarHorizons/Clothing/Hands/Gloves/salvaget1.rsi
  - type: Insulated
  - type: Fiber
    fiberMaterial: fibers-insulative
    fiberColor: fibers-brown

- type: entity
  parent: ClothingHandsGlovesScrapperTierOne
  id: ClothingHandsGlovesScrapperTierTwo
  name: Scrapper Gloves
  description: These gloves will protect the wearer from electric shocks along with some minor armor.
  components:
  - type: FingerprintMask
  - type: Sprite
    sprite: _FarHorizons/Clothing/Hands/Gloves/salvaget2.rsi
  - type: Clothing
    sprite: _FarHorizons/Clothing/Hands/Gloves/salvaget2.rsi
  - type: Armor
    modifiers: 
      coefficients:
        Blunt: 1
  - type: LimbArmor
    limbs:
      Head:
        flatReductions:
          Slash: 2
          Piercing: 3
        coefficients:
          Blunt: 0.85
          Slash: 0.8
          Piercing: 0.8

- type: entity
  parent: [ BaseSalvageContraband, ClothingHandsGlovesCombat ]
  id: ClothingHandsSalvageMercGlovesCombatGoliath
  name: Goliath Scrapper Combat Gloves 
  description: High-quality insulated gloves that provide protection while salvaging with added Goliath Flesh.
  components:
    - type: Sprite
      sprite: _FarHorizons/Clothing/Hands/Gloves/salvagecombat_goliath.rsi 
    - type: Clothing
      sprite: _FarHorizons/Clothing/Hands/Gloves/salvagecombat_goliath.rsi 
    - type: Fiber
      fiberColor: fibers-red
    - type: LimbArmor
      limbs:
        Head:
          coefficients:
            Blunt: 0.65
            Slash: 0.60
            Piercing: 0.60
    - type: MeleeWeapon
      autoAttack: true
      attackRate: 1.0
      damage:
        types:
          Blunt: 7
          Slash: 7
          Structural: 14
      soundHit:
        collection: MetalThud
        params:
          volume: 5
          pitch: 0.3
          variation: 0.025

#region ## NanoTrasen ##
# upstream deleting these, preserving them here
- type: entity
  parent: ClothingHandsGlovesBoxingBlue
  id: ClothingHandsGlovesBoxingRigged
  suffix: Rigged
  components:
  - type: StaminaDamageOnHit
    damage: 25
  - type: MeleeWeapon
    attackRate: 1.4
    damage:
      types:
        Blunt: 8
    bluntStaminaDamageFactor: 0.0 # so blunt doesn't deal stamina damage at all
    mustBeEquippedToUse: true

- type: entity
  parent: [ClothingHandsBase, BaseSecurityContraband]
  id: ClothingHandsGlovesSecurityPowered
  name: Heavy Security Power Gauntlets
  description: These gauntlets utilize the power systems within the Heavy Security Hardsuit mixed with hydraulics to ruin the day of anyone. And walls, for that matter. Does not work without the Heavy Hardsuit.
  components:
  - type: Sprite
    sprite: _FarHorizons/Clothing/Hands/Gloves/heavy_security_gauntlet.rsi
  - type: Clothing
    sprite: _FarHorizons/Clothing/Hands/Gloves/heavy_security_gauntlet.rsi
  - type: MeleeWeapon
    autoAttack: true
    attackRate: 0.7
    damage:
      types:
       Blunt: 30 # 21 dps vs. fireaxe's 22.5 dps - Suit should hit really hard given how slow it is.
       Structural: 50 # worse than fireaxe + breaching hammer
    soundHit:
      collection: MetalThud
      params:
        volume: 5
        pitch: 0.3
        variation: 0.025
    animation: WeaponArcFist
    mustBeEquippedToUse: true
  - type: Insulated
  - type: Fiber
    fiberMaterial: fibers-insulative
    fiberColor: fibers-blue
  - type: FingerprintMask
  - type: RestrictByEquippedTag
    requiredTag: "RequiredForLmgTag"
    denialMessage: "lmg-restricted-to-hardsuit-message"
    denialSound: /Audio/Machines/custom_deny.ogg
  - type: Tag
    tags:
      - HeavySecSuitGloves

- type: entity
  parent: [ClothingHandsBase, BaseSyndicateContraband]
  id: ClothingHandsGlovesSyndicatePowered
  name: Juggernaut Power Gauntlets
  description: These gauntlets utilize the power systems within the Juggernaut mixed with hydraulics to ruin the day of anyone. And walls, for that matter. Does not work without the Juggernaut.
  components:
