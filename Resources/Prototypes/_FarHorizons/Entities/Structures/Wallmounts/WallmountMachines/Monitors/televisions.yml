    color: "#3decff"

- type: entity
  parent: WallmountTelevision
  id: WallmountTelevisionLMC
  suffix: MinersLMC, NT
  components:
  - type: Sprite
    layers:
      - map: ["computerLayerBody"]
        state: television_wall
      - map: ["computerLayerScreen"]
