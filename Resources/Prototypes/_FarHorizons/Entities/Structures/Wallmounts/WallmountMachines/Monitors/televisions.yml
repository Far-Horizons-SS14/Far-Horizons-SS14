    color: "#f7ba00"

- type: entity
  parent: WallmountTelevision
  id: WallmountTelevisionNTWorlds
  suffix: NTWorlds, NT
  components:
  - type: Sprite
    layers:
      - map: ["computerLayerBody"]
        state: television_wall
      - map: ["computerLayerScreen"]
        state: NTworlds
  - type: PointLight
    enabled: true
    energy: 2
    radius: 2.5
    offset: 0.0, -.75
    color: "#3decff"
  
  
- type: entity
  parent: MarkerBase
  name: random television spawner
  id: WallmountTelevisionRandomSpawner
  suffix: NT
  components:
    - type: Sprite
      layers:
        - state: red
        - sprite: _FarHorizons/Structures/Wallmounts/flatscreentv.rsi
          state: television_wall
    - type: RandomSpawner
      prototypes:
        - WallmountTelevisionCWS
        - WallmountTelevisionSec
        - WallmountTelevisionGensys
        - WallmountTelevisionLime
        - WallmountTelevisionLMC
        - WallmountTelevisionNTWorlds
      offset: 0.0

