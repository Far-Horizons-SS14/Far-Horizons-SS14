# Base Suit Storage Locker for Far Horizons SS14
- type: entity
  id: SuitStorageBaseFH # Decided to make a whole new base due to the YML code structures required.
  parent: SuitStorageBase
  name: Suit Storage Unit 
  description: A very modular looking structure. It has a large shutter-like door that can open and close, as well as equipped with locking and unlocking capabilities. On the side is a large screen that repeatedly flashes an animation of a person that then dawns a helmet.
  components:
  - type: EntityStorage
    closeSound: /Audio/_FarHorizons/Machines/suit_storage_close.ogg
    openSound: /Audio/_FarHorizons/Machines/suit_storage_open.ogg
  - type: Sprite
    sprite: _FarHorizons/Structures/Storage/suit_storage.rsi
    layers:
    - state: base
    - state: door
      map: ["enum.StorageVisualLayers.Door"]
    - state: welded
      visible: false
      map: ["enum.WeldableLayers.BaseWelded"]
    - state: locked
      map: ["enum.LockVisualLayers.Lock"]
      shader: unshaded
    - state: screen-eva
      map: ["computerLayerScreen"]