# Genpop Storage
- type: entity
  parent: [ GenpopBase , LockerBaseSecureSyndi ]
  id: LockerPrisonerNS
  name: Prisoner Closet 
  description: It's a secure locker for an inmate's personal belongings during their time in prison.
  suffix: 1, NS
  components:
  - type: Fixtures
    fixtures:
      fix1:
        shape: !type:PolygonShape
          radius: 0.01
          vertices:
          - -0.25,-0.48
          - 0.25,-0.48
          - 0.25,0.48
          - -0.25,0.48
        mask:
        - Impassable
        - TableLayer
        - LowImpassable
        layer:
        - BulletImpassable
        - Opaque
        density: 75
        hard: True
        restitution: 0
        friction: 0.4
  - type: AccessReader
    access: [["SecurityNS"]]
    examinationText: access-reader-examination-functionality-restricted


