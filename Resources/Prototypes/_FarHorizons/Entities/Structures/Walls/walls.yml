# Walls

- type: entity
  parent: WallSolid
  id: WallSolidNeutral
  suffix: ""
  name: Solid Wall
  components:
  - type: Sprite
    sprite: Structures/Walls/solid.rsi #TODO: neutral sprite
  - type: Icon
    sprite: Structures/Walls/solid.rsi #TODO: neutral sprites

- type: entity
  parent: WallSolid
  id: WallSolidSyndicate
  name: Solid Wall
  suffix: NS
  components:
  - type: Sprite
    sprite: _FarHorizons/Structures/Walls/solid_syndie.rsi
  - type: Icon
    sprite: _FarHorizons/Structures/Walls/solid_syndie.rsi

- type: entity
  parent: WallReinforced
  id: WallReinforcedNeutral
  name: Reinforced Wall
  suffix: ""
  components:
  - type: Sprite
    sprite: Structures/Walls/solid.rsi #TODO: neutral sprites
  - type: Icon
    sprite: Structures/Walls/solid.rsi #TODO: neutral sprites
    state: rgeneric
  - type: GenericVisualizer
    visuals:
      enum.ReinforcedWallVisuals.DeconstructionStage:
        ReinforcedWallVisualLayers.Deconstruction:
          -1: { visible: false }
          0: { state: reinf_construct-0, visible: true}
          1: { state: reinf_construct-1, visible: true}
          2: { state: reinf_construct-2, visible: true}
          3: { state: reinf_construct-3, visible: true}
          4: { state: reinf_construct-4, visible: true}
          5: { state: reinf_construct-5, visible: true}

- type: entity
  parent: WallReinforced
  id: WallReinforcedSyndicate
  name: Reinforced Wall
  suffix: NS
  components:
  - type: Sprite
    sprite: _FarHorizons/Structures/Walls/solid_syndie.rsi
  - type: Icon
    sprite: _FarHorizons/Structures/Walls/solid_syndie.rsi
    state: rgeneric
  - type: GenericVisualizer
    visuals:
      enum.ReinforcedWallVisuals.DeconstructionStage:
        ReinforcedWallVisualLayers.Deconstruction:
          -1: { visible: false }
          0: { state: reinf_construct-0, visible: true}
          1: { state: reinf_construct-1, visible: true}
          2: { state: reinf_construct-2, visible: true}
          3: { state: reinf_construct-3, visible: true}
          4: { state: reinf_construct-4, visible: true}
          5: { state: reinf_construct-5, visible: true}

- type: entity
  parent: BaseWall
  id: WallFakeNT
  name: Solid Wall
  suffix: Fake, NT
  description: This wall feels.. hollow. Some signage reads "Break in event of Emergency!"
  components:
  - type: Sprite
    sprite: Structures/Walls/solid.rsi
  - type: WallReplacementMarker
  - type: Icon
    sprite: Structures/Walls/solid.rsi
  - type: RCDDeconstructable
    cost: 6
    delay: 8
    fx: EffectRCDDeconstruct8
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: FlimsyMetallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100 # ~12 hits with a standard toolbox, which I feel is fair
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalSlam
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalSlam
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: IconSmooth
    key: walls
    base: solid
  - type: Paintable
    group: WallSolid
  - type: GenericPaintable