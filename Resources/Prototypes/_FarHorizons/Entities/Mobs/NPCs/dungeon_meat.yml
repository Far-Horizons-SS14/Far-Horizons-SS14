# Miniboss type, large and slow
- type: entity
  parent: BaseMobFleshSalvage
  id: MobDungeonMeatGiant
  suffix: Dungeon
  components:
  - type: Sprite
    layers:
    - map: [ "enum.DamageStateVisualLayers.Base" ]
      state: jared
  - type: ScaleVisuals
    scale: 1.5,1.5
  - type: DamageStateVisuals
    states:
      Alive:
        Base: jared
      Critical:
        Base: dead
      Dead:
        Base: dead
  - type: MobThresholds
    thresholds:
      0: Alive
      100: Dead # 4 PKA shots
  - type: MovementSpeedModifier
    baseWalkSpeed : 2.5
    baseSprintSpeed : 2.5
  - type: SlowOnDamage
    speedModifierThresholds:
      80: 0.5
  - type: MeleeWeapon
    attackRate: 0.3
    damage:
      types:
        Slash: 15
  - type: MobSplitting
    sound:
      collection: gib
    splitInto:
      MobDungeonMeatGuy:
        min: 0
        max: 1
      MobDungeonMeatFlying:
        min: 1
        max: 2