# Fast and weak boi
- type: entity
  parent: BaseMobFleshSalvage
  id: MobDungeonMeatFast
  suffix: Dungeon
  components:
  - type: Sprite
    layers:
    - map: [ "enum.DamageStateVisualLayers.Base" ]
      state: clamp
  - type: DamageStateVisuals
    states:
      Alive:
        Base: clamp
      Critical:
        Base: dead
      Dead:
        Base: dead
  - type: MobThresholds
    thresholds:
      0: Alive
      25: Dead # 1 PKA shot
  - type: MovementSpeedModifier
    baseWalkSpeed : 5.5
    baseSprintSpeed : 5.5
  - type: MeleeWeapon
    attackRate: 2
    damage:
      types:
        Slash: 2
  - type: SlowOnDamage
    speedModifierThresholds:
      15: 0.7

# Generic meat dude
- type: entity
  parent: BaseMobFleshSalvage
  id: MobDungeonMeatGuy
  suffix: Dungeon
  components:
  - type: Sprite
    layers:
    - map: [ "enum.DamageStateVisualLayers.Base" ]
      state: golem
  - type: DamageStateVisuals
    states:
      Alive:
        Base: golem
      Critical:
        Base: dead
      Dead:
        Base: dead
  - type: MobThresholds
    thresholds:
      0: Alive
      50: Dead # 2 PKA shots
  - type: SlowOnDamage
    speedModifierThresholds:
      25: 0.7
  - type: MovementSpeedModifier
    baseWalkSpeed : 3.5
    baseSprintSpeed : 3.5
  - type: MeleeWeapon
    attackRate: 1.2
    damage:
      types:
        Slash: 4
  - type: MobSplitting
    sound:
      collection: gib
    splitInto:
      MobDungeonMeatFast:
        min: 1
        max: 3

