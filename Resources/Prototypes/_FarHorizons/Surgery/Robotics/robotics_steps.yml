- type: entity
  parent: SurgeryStepBase
  id: SurgeryStepRemoveScrews
  name: Remove Screws
  components:
  - type: SurgeryStep
    tools:
    - type: ScrewdriverSurgery
  - type: Sprite
    sprite: Objects/Tools/screwdriver.rsi
    state: screwdriver-map
  - type: OnFailDamage
    damage: 
      types:
        Slash: 10

