- type: entity
  parent: SurgeryBase
  id: SurgeryAlterAppearance
  name: Plastic Surgery
  description: Alters the patient's appearance.
  components:
  - type: Surgery
    requirement:
    - SurgeryOpenIncision
    steps:
    - SurgeryStepRetractSkin
    - SurgeryStepAlterAppearance
    - SurgeryStepCloseIncision
  - type: SurgeryPartCondition
    parts:
    - Head
  - type: Sprite
    sprite: Mobs/Species/Human/parts.rsi
    state: head_m
  - type: SurgeryTechnology
    requiredTechnology: SurgeryTech 

- type: entity
  parent: SurgeryBase
  id: SurgeryTendBrute
  name: Tend Brute Wound
  description: Heals Brute Injuries.
  components:
  - type: Surgery
    steps:
    - SurgeryStepCarefulIncision
    - SurgeryStepRepairBrute 
    - SurgeryStepSealWound
  - type: SurgeryPartCondition
    parts:
    - Torso
  - type: SurgeryTechnology
    technologyModifier:
      SurgeryTech : 50
      SurgeryTechAdvanced : 25

- type: entity
  parent: SurgeryBase
  id: SurgeryTendBurn
  name: Tend Burn Wounds
  description: Heals Burn Injuries.
  components:
  - type: Surgery
    steps:
    - SurgeryStepCarefulIncision
    - SurgeryStepRepairBurn 
    - SurgeryStepSealWound
  - type: SurgeryPartCondition
    parts:
    - Torso
  - type: SurgeryTechnology
    technologyModifier:
      SurgeryTech : 50
      SurgeryTechAdvanced : 25
    
- type: entity
  parent: SurgeryBase
  id: SurgeryEndNecrosis
  name: Finish Removing Necrotic Flesh
  description: We have tried our best.
  components:
  - type: Surgery
    priority: 100
    requirement: 
      - SurgeryReverseNecrosis
    steps:
    - SurgeryStepEndNecrosisSurgery
  - type: SurgeryPartCondition
    parts:
    - Torso

- type: entity
  parent: SurgeryBase
  id: SurgeryReverseNecrosis
  name: Start Removing Necrotic Flesh
  description: We can try our best. 
  components:
  - type: Surgery
    requirement:
    - SurgeryOpenIncision
    - SurgeryOpenIncisionSlime
    steps:
    - SurgeryStepCutRottenFlesh
    - SurgeryStepInspectForNecrosis
  - type: SurgeryPartCondition
    parts:
    - Torso
  - type: NecrosisSurgery
  
- type: entity
  parent: SurgeryBase
  id: SurgeryRepairEyes
  name: Repair Eyes
  components:
  - type: Surgery
    requirement:
    - SurgeryOpenIncision
    - SurgeryOpenIncisionSlime
    steps:
    - SurgeryStepInspectEyeDamage
    - SurgeryStepRepairEyeDamage
  - type: SurgeryPartCondition
    parts:
    - Head
  - type: SurgeryOrganExistCondition
    organ:
    - type: OrganEyes
  - type: Sprite
    sprite: Mobs/Species/Human/organs.rsi
    layers:
      - state: eyeball-l
      - state: eyeball-r
  - type: AnimalBypass

