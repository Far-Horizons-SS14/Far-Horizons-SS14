- type: trait
  id: MagicalEncounter
  name: trait-background-magical-encounter-name
  description: trait-background-magical-encounter-description
  category: BackgroundTraits
  cost: 2
  effects:
    - !type:AddCompsEffect
      components:
      - type: IntrinsicAugments
        action: ActionOpenCantripStore
        addComponents:
          - type: Store
            name: store-preset-name-cantrips
            categories:
            - CantripsStandard
            currencyWhitelist:
            - IntrinsicPoint
            refundAllowed: false
            balance:
              IntrinsicPoint: 2

- type: trait
  id: Chromehead
  name: trait-background-chromehead-name
  description: trait-background-chromehead-description
  category: BackgroundTraits
  cost: 3
  effects:
    - !type:CyberneticsPointsEffect
      change: 3 # +3 points to spend

- type: trait
  id: Vampire
  name: trait-background-vampire-name
  description: trait-background-vampire-description
  category: BackgroundTraits
  cost: 2
  effects:
    - !type:AddCompsEffect
      components:
      - type: LesserVampire
        bloodPoolAlert: VampireBloodPool
        bloodPoolAlertSegments: 25 # 25 segment display alert
        bloodPoolMax: 100
        metabolizer: LesserVampire
        drinkDelay: 2
        drinkAmount: 4 # Tiny little sips, we wouldn't want to hurt anyone, would we?
        traitsAction: ActionOpenVampireTraits
        traitsUiKey: enum.VampireTraitsUiKey.Key
        allowTraitSelection: true
  requirements:
    - !type:SpeciesRequirement
      species:
        - IPC
      inverted: true