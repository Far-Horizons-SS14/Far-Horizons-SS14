#Gorlex-Tactical-Implant 'Vanguard' Arms
- type: entity
  id: LeftArmCyberGorlexTacticalImplantVanguard
  name: "left GTI 'Vanguard' arm"
  description: "A popular cybernetic arm commonly found on most syndicate commanders stationed on the many syndicate-stations, the cybernetic itself, equipped with the GTI 'Cyber-Scattergun', how in the world did you get this?"
  parent: [PartCyber, BaseLeftArm, BaseSyndicateContraband]
  components:
    - type: BaseLayerId
      layer: CyberLArmGTIVanguard
    - type: BaseLayerIdToggled
      layer: CyberLArmGTIVanguardToggled 
    - type: Sprite
      sprite: _FarHorizons/Mobs/Species/Cyberlimbs/parts.rsi
      state: "l_gti_vanguard_arm"
    - type: Icon
      sprite: _FarHorizons/Mobs/Species/Cyberlimbs/parts.rsi
      state: "l_gti_vanguard_arm"
    - type: LimbItemStorage
      items:
        - CyberScatterGun
    - type: LimbItemDeployer
      action: ActionToggleCyberHandSyndiLeft
      sound:
        path: /Audio/_FarHorizons/Effects/Cybernetic/GTI_vanguard_activate.ogg
      handWhitelist:
        tags:
          - CyberHandItem
    - type: WithAttachedBodyParts
      parts:
        left hand: LeftHandCyberGTIVanguard
    - type: HumanoidEMPCompositeElement
      effect:
        stunAmount: 1.0
        dropItemsFrom:
        - body_part_slot_left hand
        damageAmount:
          types:
            Shock: 15

