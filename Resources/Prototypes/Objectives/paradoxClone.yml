- type: entity
  abstract: true
  parent: BaseObjective
  id: BaseParadoxCloneObjective
  components:
  - type: Objective
    # required but not used
    difficulty: 1
    issuer: objective-issuer-paradox
  - type: RoleRequirement
    roles:
    - ParadoxCloneRole
  - type: Tag
    tags:
    - ParadoxCloneObjectiveBlacklist # don't copy the objectives from other clones

- type: entity
  parent: [BaseParadoxCloneObjective, BaseSurviveObjective] #FH
  id: ParadoxCloneLivingObjective
  name: Survive. #FH
  description: Find a way to fix the the paradox that brought you here! The local Research Director might know something.. Or you could just try to kill the "you" in this reality. Chosing to do nothing will result in your certain doom at the end of the shift. #FH
  components:
  - type: Objective
    difficulty: 1 #FH
    icon:
      sprite: Mobs/Species/Human/organs.rsi #FH
      state: heart-on #FH
#  - type: EscapeShuttleCondition - FH

