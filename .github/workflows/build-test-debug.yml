name: Build & Test Debug

on:
  workflow_dispatch:
  pull_request:
    types: [ opened, reopened, synchronize, ready_for_review ]
    branches: [ Far-Horizons ]
    paths:
      - '**.cs'
      - '**.csproj'
      - '**.sln'
      - '**.yml'
      - '**.yaml'

jobs:
  unit-test:
    if: "!contains(github.event.pull_request.labels.*.name, 'automated pr') && github.actor != 'github-actions[bot]' && github.event.pull_request.draft == false"

    runs-on: ubuntu-24.04-arm

    steps:
    - uses: actions/checkout@v4
    
    - uses: ./.github/actions/setup-test-env

    - name: Run Content.Tests
      run: dotnet test --no-build -c DebugOpt Content.Tests/Content.Tests.csproj -- NUnit.ConsoleOut=0
  
  integration-tests:
    if: "!contains(github.event.pull_request.labels.*.name, 'automated pr') && github.actor != 'github-actions[bot]' && github.event.pull_request.draft == false"

    runs-on: ubuntu-24.04-arm

    steps:
    - uses: actions/checkout@v4

    - uses: ./.github/actions/setup-test-env

    - name: swap
      run: |
        sudo fallocate -l 6G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        free -h

    - name: Run Content.IntegrationTests
      shell: pwsh
      run: |
        $env:DOTNET_gcServer=0
        $env:DOTNET_GCHeapHardLimitPercent=60
        dotnet test --no-build  --maxcpucount:1 -c DebugOpt Content.IntegrationTests/Content.IntegrationTests.csproj -- NUnit.ConsoleOut=0 NUnit.NumberOfTestWorkers=1 NUnit.RetryCount=1 NUnit.MapWarningTo=Failed

