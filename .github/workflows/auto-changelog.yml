name: Update Changelog

on:
  pull_request:
    types: [closed]
    branches: [Far-Horizons]
      
permissions:
  contents: write
  pull-requests: write
  actions: read

env:
 BRANCH_NAME: ${{ github.ref_name	}} 

jobs:
  update-changelog:
    if: github.event.pull_request.merged == true && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: Far-Horizons
          
      - name: Set up Python
        if: steps.get_pr.outputs.result != ''
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        if: steps.get_pr.outputs.result != ''
        run: |
          pip install pyyaml PyGithub
    
      - name: Parse PR and Update Changelog
        if: steps.get_pr.outputs.result != ''
        env:
          CHANGELOG_FILE_PATH: 'Resources/Changelog/ChangelogFarHorizons.yml'
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.get_pr.outputs.result }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python ./Tools/_FarHorizons/update_changelog.py
      
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          commit-message: Update changelog for PR/${{ steps.get_pr.outputs.result }} [skip ci]
          committer: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          author: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          signoff: false
          branch: ci-branch/patch-changelog-${{ steps.get_pr.outputs.result }}
          delete-branch: true
          title: '[CI] Update patchnotes for ${{ steps.get_pr.outputs.result }}'
          body: |
            Automated PR to populate patchnotes
          labels: |
            automated pr
          
