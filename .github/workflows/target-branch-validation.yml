name: Check PR Target Branch

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  check-target-branch:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check if PR targets stage
        run: |
          SOURCE_BRANCH="${{ github.event.pull_request.head.ref }}"
          TARGET_BRANCH="${{ github.event.pull_request.base.ref }}"
          echo "PR from: $SOURCE_BRANCH -> $TARGET_BRANCH"
          
          # Allow starlight-dev to starlight PRs in both directions
          if [[ ("$SOURCE_BRANCH" == "stage" && "$TARGET_BRANCH" == "Far-Horizons") || 
                ("$SOURCE_BRANCH" == "Far-Horizons" && "$TARGET_BRANCH" == "stage") ]]; then
            echo "Allowed: PR between stage and Far-Horizons branches"
            exit 0
          fi
          
          # For all other PRs, require starlight-dev as target
          if [ "$TARGET_BRANCH" != "stage" ]; then
            echo "Error: PR must target 'stage' branch, but targets '$TARGET_BRANCH'"
            echo "Please change the target branch to 'stage'"
            exit 1
          else
            echo "Success: PR correctly targets 'stage' branch"
          fi
